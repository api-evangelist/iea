  - Emissions
  - Renewables
  - Oil
  - Statistics
  - Climate
apis:
  - name: IEA Real-Time Emissions Factors API
    description: Provides up-to-hourly CO2 intensity and emissions data from the power sector for countries worldwide. Data is sourced from transmission system operators, market operators, and statistical agencies, combined with annual emission factors from national statistical offices.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.iea.org/data-and-statistics/data-product/real-time-emissions-factors-api-access
    baseURL: https://api.iea.org
    tags:
      - Emissions
      - CO2
      - Real-Time
      - Electricity
      - Power Sector
