      - type: FinOps
        url: https://raw.githubusercontent.com/api-evangelist/iea/refs/heads/main/finops/iea-finops.yml
  - name: IEA Data Products API
    description: Programmatic access to IEA's suite of purchased data products including World Energy Balances, World Energy Statistics, Monthly Electricity Statistics, Energy Prices, and Emissions Factors. Uses bearer token authentication tied to active product subscriptions.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
